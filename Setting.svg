<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10" y="-10" width="400" height="200" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D6A4F" flood-opacity="0.1"/>
    </filter>
    <filter id="avatarShadow" x="-10" y="-10" width="150" height="150" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#2D6A4F" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="375" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#74C69D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="375" height="812" fill="#F4F9F6"/>
  
  <!-- Header with profile area -->
  <rect width="375" height="240" fill="url(#headerGrad)"/>
  <path d="M0 240 Q187 220 375 240 L375 260 L0 260 Z" fill="#F4F9F6"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="100" r="60" fill="#52B788" opacity="0.2"/>
  <circle cx="340" cy="180" r="80" fill="#40916C" opacity="0.15"/>
  
  <!-- Status Bar -->
  <text x="187" y="28" font-family="SF Pro Display, system-ui" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">9:41</text>
  <rect x="336" y="17" width="24" height="11" rx="3" stroke="#FFFFFF" stroke-width="1.2" fill="none"/>
  <rect x="338" y="19" width="18" height="7" rx="2" fill="#FFFFFF"/>
  
  <!-- Close button -->
  <g transform="translate(24, 60)">
    <circle r="16" fill="#FFFFFF" fill-opacity="0.2"/>
    <path d="M-6 -6 L6 6 M6 -6 L-6 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="187" y="76" font-family="SF Pro Display, system-ui" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">设置</text>
  
  <!-- Avatar -->
  <g filter="url(#avatarShadow)">
    <circle cx="187" cy="160" r="48" fill="#FFFFFF"/>
  </g>
  <circle cx="187" cy="160" r="44" fill="url(#avatarGrad)"/>
  <text x="187" y="172" font-family="SF Pro Display, system-ui" font-size="32" fill="#FFFFFF" text-anchor="middle">👨‍🍳</text>
  
  <!-- Edit avatar button -->
  <circle cx="220" cy="192" r="14" fill="#FFFFFF"/>
  <circle cx="220" cy="192" r="12" fill="#52B788"/>
  <path d="M216 192 L220 188 L224 192 L220 196 Z" fill="#FFFFFF"/>
  
  <!-- Username -->
  <text x="187" y="240" font-family="SF Pro Display, system-ui" font-size="20" font-weight="700" fill="#1B4332" text-anchor="middle">小厨师</text>
  <text x="187" y="262" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D" text-anchor="middle">ID: chef_2024</text>
  
  <!-- Admin Badge -->
  <rect x="152" y="274" width="72" height="24" rx="12" fill="#FEF3E2"/>
  <text x="188" y="290" font-family="SF Pro Display, system-ui" font-size="12" font-weight="600" fill="#E76F51" text-anchor="middle">🌟 管理员</text>
  
  <!-- Settings List -->
  <!-- Section 1: Account -->
  <text x="24" y="328" font-family="SF Pro Display, system-ui" font-size="13" font-weight="600" fill="#6C757D">账号设置</text>
  
  <g filter="url(#cardShadow)">
    <rect x="16" y="340" width="343" height="120" rx="20" fill="#FFFFFF"/>
  </g>
  
  <!-- Edit Profile -->
  <g transform="translate(32, 360)">
    <circle r="20" fill="#E9F5EC"/>
    <text y="6" font-family="SF Pro Display, system-ui" font-size="18" text-anchor="middle">✏️</text>
  </g>
  <text x="68" y="366" font-family="SF Pro Display, system-ui" font-size="16" font-weight="500" fill="#1B4332">编辑资料</text>
  <text x="68" y="386" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">修改用户名、头像</text>
  <path d="M335 370 L341 376 L335 382" stroke="#95D5B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <line x1="68" y1="408" x2="343" y2="408" stroke="#E9F5EC" stroke-width="1"/>
  
  <!-- Change Password -->
  <g transform="translate(32, 436)">
    <circle r="20" fill="#E9F5EC"/>
    <text y="6" font-family="SF Pro Display, system-ui" font-size="18" text-anchor="middle">🔐</text>
  </g>
  <text x="68" y="442" font-family="SF Pro Display, system-ui" font-size="16" font-weight="500" fill="#1B4332">修改密码</text>
  <path d="M335 436 L341 442 L335 448" stroke="#95D5B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Section 2: Admin -->
  <text x="24" y="496" font-family="SF Pro Display, system-ui" font-size="13" font-weight="600" fill="#6C757D">管理员功能</text>
  
  <g filter="url(#cardShadow)">
    <rect x="16" y="508" width="343" height="120" rx="20" fill="#FFFFFF"/>
  </g>
  
  <!-- Manage Users -->
  <g transform="translate(32, 528)">
    <circle r="20" fill="#FEF3E2"/>
    <text y="6" font-family="SF Pro Display, system-ui" font-size="18" text-anchor="middle">👥</text>
  </g>
  <text x="68" y="534" font-family="SF Pro Display, system-ui" font-size="16" font-weight="500" fill="#1B4332">管理用户</text>
  <text x="68" y="554" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">设置管理员权限</text>
  <path d="M335 538 L341 544 L335 550" stroke="#95D5B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <line x1="68" y1="576" x2="343" y2="576" stroke="#E9F5EC" stroke-width="1"/>
  
  <!-- History Orders -->
  <g transform="translate(32, 604)">
    <circle r="20" fill="#E8F5E9"/>
    <text y="6" font-family="SF Pro Display, system-ui" font-size="18" text-anchor="middle">📋</text>
  </g>
  <text x="68" y="610" font-family="SF Pro Display, system-ui" font-size="16" font-weight="500" fill="#1B4332">历史订单</text>
  <text x="68" y="630" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">查看所有已完成订单</text>
  <path d="M335 614 L341 620 L335 626" stroke="#95D5B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Logout Button -->
  <rect x="16" y="660" width="343" height="52" rx="26" fill="#FFEBEE"/>
  <text x="187" y="692" font-family="SF Pro Display, system-ui" font-size="16" font-weight="600" fill="#EF5350" text-anchor="middle">退出登录</text>
  
  <!-- Bottom Navigation -->
  <rect y="732" width="375" height="80" rx="24" fill="#FFFFFF"/>
  
  <!-- Menu Tab -->
  <g transform="translate(42, 752)">
    <rect width="20" height="3" rx="1.5" fill="#95D5B2"/>
    <rect y="6" width="14" height="3" rx="1.5" fill="#B7E4C7"/>
    <rect y="12" width="20" height="3" rx="1.5" fill="#95D5B2"/>
  </g>
  <text x="54" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="500" fill="#6C757D" text-anchor="middle">菜单</text>
  
  <!-- Orders Tab -->
  <g transform="translate(175, 750)">
    <rect x="-6" y="-4" width="36" height="28" rx="8" stroke="#95D5B2" stroke-width="2" fill="none"/>
    <rect x="2" y="6" width="20" height="2" rx="1" fill="#95D5B2"/>
    <rect x="2" y="12" width="14" height="2" rx="1" fill="#95D5B2"/>
  </g>
  <text x="187" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="500" fill="#6C757D" text-anchor="middle">订单</text>
  
  <!-- Settings Tab (Active) -->
  <g transform="translate(298, 746)">
    <rect x="-10" y="-4" width="44" height="44" rx="14" fill="#E9F5EC"/>
    <circle cx="10" cy="14" r="12" stroke="#2D6A4F" stroke-width="2" fill="none"/>
    <circle cx="10" cy="14" r="4" fill="#2D6A4F"/>
  </g>
  <text x="308" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="600" fill="#2D6A4F" text-anchor="middle">设置</text>
  
  <!-- Home Indicator -->
  <rect x="121" y="800" width="134" height="5" rx="2.5" fill="#1B4332" opacity="0.2"/>
</svg>
