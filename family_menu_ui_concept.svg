  <text x="136" y="1858" fill="#0F172A" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Flutter 落地建议
  </text>
  <text x="136" y="1902" fill="#334155" font-size="21" font-family="Arial, Helvetica, sans-serif">
    用 Material 3，自定义 ColorScheme；卡片圆角 24~28；主按钮高度 44~48；页面横向边距 20~24。
