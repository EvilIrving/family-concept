  <text x="136" y="1440" fill="#0F172A" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    设计说明
  </text>
  <text x="136" y="1490" fill="#334155" font-size="21" font-family="Arial, Helvetica, sans-serif">
    1. 视觉方向：浅底色 + 深色文字 + 绿色作为品牌强调色，适合“家庭、做饭、健康”主题。
  </text>
  <text x="136" y="1536" fill="#334155" font-size="21" font-family="Arial, Helvetica, sans-serif">
    2. 信息架构：首页强调“浏览和点菜”，订单页强调“执行和采购”，避免页面职责混乱。
  </text>
  <text x="136" y="1582" fill="#334155" font-size="21" font-family="Arial, Helvetica, sans-serif">
    3. 组件策略：统一使用圆角卡片、轻阴影、胶囊按钮，Flutter 中很容易落地。
  </text>
  <text x="136" y="1628" fill="#334155" font-size="21" font-family="Arial, Helvetica, sans-serif">
    4. 交互重点：点菜按钮、推荐组合、一键导出清单，都是提高使用频率的关键入口。
  </text>

