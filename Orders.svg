<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-10" y="-10" width="400" height="200" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D6A4F" flood-opacity="0.1"/>
    </filter>
    <filter id="btnShadow" x="-10" y="-10" width="400" height="80" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D6A4F" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="375" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#40916C"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="375" height="812" fill="#F4F9F6"/>
  <!-- Decorative elements -->
  <ellipse cx="-30" cy="300" rx="100" ry="80" fill="#D8F3DC" opacity="0.4"/>
  <ellipse cx="400" cy="500" rx="120" ry="100" fill="#B7E4C7" opacity="0.3"/>
  
  <!-- Status Bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="187" y="28" font-family="SF Pro Display, system-ui" font-size="14" font-weight="600" fill="#1B4332" text-anchor="middle">9:41</text>
  <rect x="336" y="17" width="24" height="11" rx="3" stroke="#1B4332" stroke-width="1.2"/>
  <rect x="338" y="19" width="18" height="7" rx="2" fill="#2D6A4F"/>
  
  <!-- App Bar -->
  <rect y="44" width="375" height="64" fill="url(#headerGrad)"/>
  <path d="M0 108 Q93 98 187 108 T375 108 L375 108 L0 108" fill="#F4F9F6"/>
  
  <text x="24" y="86" font-family="SF Pro Display, system-ui" font-size="22" font-weight="700" fill="#FFFFFF">当前订单</text>
  <!-- Share icon -->
  <g transform="translate(319, 68)">
    <rect x="4" y="8" width="16" height="12" rx="3" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <path d="M12 4 L12 14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 8 L12 4 L16 8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Order Status Card -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="124" width="343" height="80" rx="20" fill="#FFFFFF"/>
  </g>
  <text x="32" y="152" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">订单状态</text>
  <rect x="32" y="162" width="80" height="28" rx="14" fill="#FEF3E2"/>
  <text x="72" y="181" font-family="SF Pro Display, system-ui" font-size="13" font-weight="600" fill="#E76F51" text-anchor="middle">点单中</text>
  <text x="276" y="152" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">参与人数</text>
  <text x="276" y="180" font-family="SF Pro Display, system-ui" font-size="20" font-weight="700" fill="#2D6A4F">4 人</text>
  <!-- Avatars -->
  <circle cx="320" cy="166" r="14" fill="#95D5B2"/>
  <text x="320" y="170" font-family="SF Pro Display, system-ui" font-size="10" fill="#FFFFFF" text-anchor="middle">+2</text>
  
  <!-- Section Title -->
  <text x="24" y="236" font-family="SF Pro Display, system-ui" font-size="18" font-weight="700" fill="#1B4332">已点菜品</text>
  <text x="335" y="236" font-family="SF Pro Display, system-ui" font-size="14" fill="#52B788">共 5 道</text>
  
  <!-- Order Item 1 - Waiting -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="252" width="343" height="88" rx="16" fill="#FFFFFF"/>
  </g>
  <!-- Food emoji circle -->
  <circle cx="56" cy="296" r="28" fill="#FFF3E6"/>
  <text x="56" y="304" font-family="SF Pro Display, system-ui" font-size="28" text-anchor="middle">🍖</text>
  <text x="96" y="284" font-family="SF Pro Display, system-ui" font-size="16" font-weight="600" fill="#1B4332">红烧肉</text>
  <text x="96" y="304" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">小明 点的 · x1</text>
  <!-- Status badge - waiting -->
  <rect x="264" y="280" width="80" height="32" rx="16" fill="#E9F5EC"/>
  <circle cx="280" cy="296" r="4" fill="#95D5B2"/>
  <text x="310" y="300" font-family="SF Pro Display, system-ui" font-size="13" font-weight="500" fill="#40916C" text-anchor="middle">等待中</text>
  
  <!-- Order Item 2 - Cooking -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="352" width="343" height="88" rx="16" fill="#FFFFFF"/>
  </g>
  <circle cx="56" cy="396" r="28" fill="#FEF3E2"/>
  <text x="56" y="404" font-family="SF Pro Display, system-ui" font-size="28" text-anchor="middle">🥩</text>
  <text x="96" y="384" font-family="SF Pro Display, system-ui" font-size="16" font-weight="600" fill="#1B4332">糖醋里脊</text>
  <text x="96" y="404" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">小红 点的 · x1</text>
  <!-- Status badge - cooking -->
  <rect x="264" y="380" width="80" height="32" rx="16" fill="#FEF3E2"/>
  <circle cx="280" cy="396" r="4" fill="#F4A261"/>
  <text x="310" y="400" font-family="SF Pro Display, system-ui" font-size="13" font-weight="500" fill="#E76F51" text-anchor="middle">制作中</text>
  <!-- Pulsing animation indicator -->
  <circle cx="280" cy="396" r="6" fill="none" stroke="#F4A261" stroke-width="1" opacity="0.5"/>
  
  <!-- Order Item 3 - Done -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="452" width="343" height="88" rx="16" fill="#FFFFFF"/>
  </g>
  <circle cx="56" cy="496" r="28" fill="#E8F5E9"/>
  <text x="56" y="504" font-family="SF Pro Display, system-ui" font-size="28" text-anchor="middle">🥒</text>
  <text x="96" y="484" font-family="SF Pro Display, system-ui" font-size="16" font-weight="600" fill="#1B4332">凉拌黄瓜</text>
  <text x="96" y="504" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">我 点的 · x2</text>
  <!-- Status badge - done -->
  <rect x="264" y="480" width="80" height="32" rx="16" fill="#D8F3DC"/>
  <circle cx="280" cy="496" r="4" fill="#2D6A4F"/>
  <text x="310" y="500" font-family="SF Pro Display, system-ui" font-size="13" font-weight="500" fill="#2D6A4F" text-anchor="middle">已完成</text>
  <!-- Checkmark -->
  <path d="M275 496 L278 499 L285 492" stroke="#2D6A4F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Order Item 4 -->
  <g filter="url(#cardShadow)">
    <rect x="16" y="552" width="343" height="88" rx="16" fill="#FFFFFF"/>
  </g>
  <circle cx="56" cy="596" r="28" fill="#FFEBEE"/>
  <text x="56" y="604" font-family="SF Pro Display, system-ui" font-size="28" text-anchor="middle">🍅</text>
  <text x="96" y="584" font-family="SF Pro Display, system-ui" font-size="16" font-weight="600" fill="#1B4332">番茄蛋汤</text>
  <text x="96" y="604" font-family="SF Pro Display, system-ui" font-size="13" fill="#6C757D">小华 点的 · x1</text>
  <rect x="264" y="580" width="80" height="32" rx="16" fill="#E9F5EC"/>
  <circle cx="280" cy="596" r="4" fill="#95D5B2"/>
  <text x="310" y="600" font-family="SF Pro Display, system-ui" font-size="13" font-weight="500" fill="#40916C" text-anchor="middle">等待中</text>
  
  <!-- Place Order Button -->
  <g filter="url(#btnShadow)">
    <rect x="24" y="660" width="327" height="56" rx="28" fill="url(#btnGrad)"/>
  </g>
  <text x="187" y="695" font-family="SF Pro Display, system-ui" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">确认下单</text>
  
  <!-- Bottom Navigation -->
  <rect y="732" width="375" height="80" rx="24" fill="#FFFFFF"/>
  
  <!-- Menu Tab -->
  <g transform="translate(42, 752)">
    <rect width="20" height="3" rx="1.5" fill="#95D5B2"/>
    <rect y="6" width="14" height="3" rx="1.5" fill="#B7E4C7"/>
    <rect y="12" width="20" height="3" rx="1.5" fill="#95D5B2"/>
  </g>
  <text x="54" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="500" fill="#6C757D" text-anchor="middle">菜单</text>
  
  <!-- Orders Tab (Active) -->
  <g transform="translate(169, 744)">
    <rect x="-10" y="-2" width="56" height="44" rx="14" fill="#E9F5EC"/>
    <rect x="0" y="6" width="36" height="28" rx="8" stroke="#2D6A4F" stroke-width="2" fill="none"/>
    <rect x="8" y="16" width="20" height="2" rx="1" fill="#2D6A4F"/>
    <rect x="8" y="22" width="14" height="2" rx="1" fill="#2D6A4F"/>
  </g>
  <text x="187" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="600" fill="#2D6A4F" text-anchor="middle">订单</text>
  
  <!-- Settings Tab -->
  <g transform="translate(308, 756)">
    <circle r="12" stroke="#95D5B2" stroke-width="2" fill="none"/>
    <circle r="4" fill="#95D5B2"/>
  </g>
  <text x="308" y="804" font-family="SF Pro Display, system-ui" font-size="11" font-weight="500" fill="#6C757D" text-anchor="middle">设置</text>
  
  <!-- Home Indicator -->
  <rect x="121" y="800" width="134" height="5" rx="2.5" fill="#1B4332" opacity="0.2"/>
</svg>
